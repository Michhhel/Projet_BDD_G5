<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENSEA — Choix du rôle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="page-auth">
  <div class="container-fluid py-5">
    <div class="text-center text-white mb-4">
      <i class="bi bi-mortarboard-fill" style="font-size:4rem"></i>
      <h1 class="mt-3 fw-bold">ENSEA Abidjan</h1>
      <p class="lead">Application de suivi des notes</p>
    </div>

    <div class="row justify-content-center g-4">
      <div class="col-md-4">
        <a href="{{ url_for('auth.login_secretariat') }}" class="card role-card shadow-lg text-decoration-none h-100">
          <div class="card-body text-center p-5">
            <i class="bi bi-shield-lock-fill display-1 text-primary"></i>
            <h3 class="mt-3">Secrétariat</h3>
            <p class="text-muted">Gestion des étudiants, notes et statistiques</p>
            <span class="btn btn-primary mt-3">
              <i class="bi bi-arrow-right-circle"></i> Se connecter
            </span>
          </div>
        </a>
      </div>
      <div class="col-md-4">
        <a href="{{ url_for('auth.login_etudiant') }}" class="card role-card shadow-lg text-decoration-none h-100">
          <div class="card-body text-center p-5">
            <i class="bi bi-person-fill display-1 text-success"></i>
            <h3 class="mt-3">Étudiant</h3>
            <p class="text-muted">Consultation de vos notes et statistiques</p>
            <span class="btn btn-success mt-3">
              <i class="bi bi-arrow-right-circle"></i> Se connecter
            </span>
          </div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
